        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function showNotification(msg, type = 'success') {
            const n = document.createElement('div');
            n.className = 'notification';
            n.textContent = msg;
            n.style.borderLeftColor = type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#f59e0b';
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        function playSound(type) {
            if (!gameState.soundEnabled) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                if (type === 'correct') {
                    osc.frequency.value = 880;
                    gain.gain.value = 0.3;
                    osc.type = 'sine';
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.5);
                    setTimeout(() => osc.stop(), 500);
                } else {
                    osc.frequency.value = 440;
                    gain.gain.value = 0.3;
                    osc.type = 'sawtooth';
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
                    setTimeout(() => osc.stop(), 300);
                }
            } catch(e) {}
        }

        // Unlock audio on first user interaction (fixes silent sound)
        function unlockAudio() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const silent = ctx.createBufferSource();
            silent.connect(ctx.destination);
            silent.start();
            ctx.resume();
            document.body.removeEventListener('click', unlockAudio);
        }
        document.body.addEventListener('click', unlockAudio);

            renderApp();
            attachPracticeListeners();
            startTimer();
        }

        function updateQuestionCount() {
            const sel = document.getElementById('questionCountSelect');
            if(sel) {
                gameState.totalQuestions = parseInt(sel.value);
                // In multiplayer, the host can send this to the server, but we'll keep it simple.
                // For now, just update local value; server will use it when startGame is called.
            }
        }

        // ==================== EVENT LISTENERS ====================
        function attachLandingListeners() {
            document.getElementById('createRoomBtn')?.addEventListener('click', () => {
                const name = document.getElementById('playerName').value.trim();
                if(!name) { showNotification('Enter your name!', 'error'); return; }
                createRoom(name);
            });
            document.getElementById('joinRoomBtn')?.addEventListener('click', () => {
                const name = document.getElementById('playerName').value.trim();
                const code = document.getElementById('roomCode').value.trim().toUpperCase();
                if(!name) { showNotification('Enter your name!', 'error'); return; }
                if(!code) { showNotification('Enter room code!', 'error'); return; }
                joinRoomByCode(code, name);
            });
            document.getElementById('practiceModeBtn')?.addEventListener('click', () => {
                const name = document.getElementById('playerName').value.trim();
                if(!name) { showNotification('Enter your name!', 'error'); return; }
                startPractice(name);
            });
        }

        function attachLobbyListeners() {
            document.getElementById('copyRoomBtn')?.addEventListener('click', () => {
                navigator.clipboard.writeText(gameState.roomCode);
                showNotification('Room code copied!', 'success');
            });
            document.getElementById('shareRoomBtn')?.addEventListener('click', () => {
                navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?room=

${gameState.roomCode}`);
                showNotification('Link copied!', 'success');
            });
            document.getElementById('startGameBtn')?.addEventListener('click', () => {
                if(gameState.players.length >= 2) startGame();
                else showNotification('Need 2+ players!', 'warning');
            });
            document.getElementById('leaveRoomBtn')?.addEventListener('click', () => {
                if(confirm('Leave room?')) {
                    currentScreen = 'landing';
                    renderApp();
                    attachLandingListeners();
                }
            });
            const qSelect = document.getElementById('questionCountSelect');
            if(qSelect) qSelect.addEventListener('change', updateQuestionCount);
        }

        function attachGameListeners() {
            document.querySelectorAll('.answer-btn').forEach(btn => {
                btn.onclick = () => checkAnswer(parseInt(btn.dataset.answerIndex));
            });
            document.getElementById('skipQuestionBtn')?.addEventListener('click', () => skipQuestion());
            document.getElementById('shareGameBtn')?.addEventListener('click', () => {
                navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?room=

${gameState.roomCode}`);
                showNotification('Link copied!', 'success');
            });
            document.getElementById('toggleLeaderboard')?.addEventListener('click', () => {
                document.getElementById('leaderboardSidebar')?.classList.toggle('active');
            });
            document.getElementById('toggleSound')?.addEventListener('click', () => {
                gameState.soundEnabled = !gameState.soundEnabled;
                document.getElementById('toggleSound').textContent = gameState.soundEnabled ? 'ON' : 'OFF';
                showNotification(`Sound ${gameState.soundEnabled ? 'ON' : 'OFF'}`, 'info');
            });
            document.getElementById('toggleVibration')?.addEventListener('click', () => {
                gameState.vibrationEnabled = !gameState.vibrationEnabled;
                document.getElementById('toggleVibration').textContent = gameState.vibrationEnabled ? 'ON' : 'OFF';
                showNotification(`Vibration ${gameState.vibrationEnabled ? 'ON' : 'OFF'}`, 'info');
            });
        }

        function attachPracticeListeners() {
            document.querySelectorAll('.answer-btn').forEach(btn => {
                btn.onclick = () => checkAnswer(parseInt(btn.dataset.answerIndex));
            });
            document.getElementById('skipQuestionBtn')?.addEventListener('click', () => skipQuestion());
            document.getElementById('exitPracticeBtn')?.addEventListener('click', () => {
                if(confirm('Exit practice mode?')) {
                    currentScreen = 'landing';
                    renderApp();
                    attachLandingListeners();
                }
            });
            document.getElementById('toggleSound')?.addEventListener('click', () => {
                gameState.soundEnabled = !gameState.soundEnabled;
                document.getElementById('toggleSound').textContent = gameState.soundEnabled ? 'ON' : 'OFF';
                showNotification(`Sound ${gameState.soundEnabled ? 'ON' : 'OFF'}`, 'info');
            });
            document.getElementById('toggleVibration')?.addEventListener('click', () => {
                gameState.vibrationEnabled = !gameState.vibrationEnabled;
                document.getElementById('toggleVibration').textContent = gameState.vibrationEnabled ? 'ON' : 'OFF';
                showNotification(`Vibration ${gameState.vibrationEnabled ? 'ON' : 'OFF'}`, 'info');
            });
        }

        // ==================== THEME TOGGLE ====================
        let currentTheme = 'dark';
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', currentTheme);
            document.getElementById('themeToggle').textContent = currentTheme === 'dark' ? '🌙' : '☀️';
            localStorage.setItem('kryptosTheme', currentTheme);
        }
        const savedTheme = localStorage.getItem('kryptosTheme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);
        currentTheme = savedTheme;
        document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '🌙' : '☀️';
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        // ==================== MAIN RENDER ====================
        function renderApp() {
            const app = document.getElementById('app');
            if(currentScreen === 'landing') { app.innerHTML = renderLanding(); attachLandingListeners(); }
            else if(currentScreen === 'lobby') { app.innerHTML = renderLobby(); attachLobbyListeners(); }
            else if(currentScreen === 'game') { app.innerHTML = renderGame(); attachGameListeners(); }
            else if(currentScreen === 'practice') { app.innerHTML = renderPractice(); attachPracticeListeners(); }
        }

        renderApp();

        // Auto-join if room code in URL
        const urlRoom = new URLSearchParams(window.location.search).get('room');
        if(urlRoom) {
            const name = prompt('Enter your name to join the battle:');
            if(name) joinRoomByCode(urlRoom, name);
        }
    </script>
</body>
</html>
